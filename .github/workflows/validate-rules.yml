---
name: Validate Rules

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'sources/**'
      - 'src/**'
      - 'pyproject.toml'
  push:
    branches:
      - main
      - develop
    paths:
      - 'sources/**'
      - 'src/**'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync

      - name: Validate unified rules
        run: uv run python src/validate_unified_rules.py sources/

      - name: Check required core rule files exist
        run: |
          echo "Checking for required core rule files..."
          required_files=(
            "sources/rules/core/codeguard-1-hardcoded-credentials.md"
            "sources/rules/core/codeguard-1-crypto-algorithms.md"
            "sources/rules/core/codeguard-1-digital-certificates.md"
            "sources/rules/core/codeguard-SKILLS.md.template"
          )
          
          missing=0
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing required file: $file"
              missing=1
            else
              echo "✅ Found: $file"
            fi
          done
          
          if [ $missing -eq 1 ]; then
            exit 1
          fi

      - name: Check skills/codeguard/ directory is up-to-date
        run: |
          echo "Checking if committed skills/codeguard/ is up-to-date..."
          
          # Save the generated skill directory only
          cp -r skills/codeguard skills-committed
          
          # Regenerate (core rules only, matching default)
          uv run python src/convert_to_ide_formats.py
          
          # Compare only the codeguard subtree
          if ! diff -r skills/codeguard/ skills-committed/ > /dev/null 2>&1; then
            echo "❌ skills/codeguard/ is out of date!"
            echo "Please regenerate by running: python src/convert_to_ide_formats.py"
            echo "Then: git add skills/codeguard/"
            diff -r skills/codeguard/ skills-committed/ || true
            rm -rf skills-committed
            exit 1
          fi
          
          rm -rf skills-committed
          echo "✅ skills/codeguard/ is up-to-date"

      - name: Test conversion to IDE formats
        run: |
          echo "Testing IDE format conversion..."
          uv run python src/convert_to_ide_formats.py --output-dir test-output
          
          # Check that files were generated
          if [ ! -d "test-output/.cursor" ]; then
            echo "❌ Cursor rules not generated"
            exit 1
          fi
          
          if [ ! -d "test-output/.windsurf" ]; then
            echo "❌ Windsurf rules not generated"
            exit 1
          fi
          
          if [ ! -d "test-output/.github" ]; then
            echo "❌ Copilot instructions not generated"
            exit 1
          fi
          
          if [ ! -d "test-output/.agents/rules" ]; then
            echo "❌ Antigravity rules not generated at .agents/rules/"
            exit 1
          fi

          if [ ! -d "test-output/.opencode" ]; then
            echo "❌ OpenCode rules not generated"
            exit 1
          fi

          # Codex discovers skills under .agents/skills/ (not .codex/skills/).
          # See src/formats/codex.py for the rationale.
          if [ ! -d "test-output/.agents/skills/codeguard" ]; then
            echo "❌ Codex skill not generated at .agents/skills/codeguard/"
            exit 1
          fi

          if [ ! -d "test-output/.openclaw" ]; then
            echo "❌ OpenClaw rules not generated"
            exit 1
          fi

          if [ ! -d "test-output/.hermes" ]; then
            echo "❌ Hermes rules not generated"
            exit 1
          fi

          AGENT_HOSTS=(
            ".claude:.claude/skills/codeguard/rules"
            ".cursor:.cursor/rules"
          )
          for entry in "${AGENT_HOSTS[@]}"; do
            h="${entry%%:*}"; rules_dir="${entry#*:}"
            test -f "test-output/$h/agents/codeguard-reviewer.md" || { echo "❌ $h codeguard-reviewer.md missing"; exit 1; }
            find "test-output/$rules_dir" -name 'codeguard-*.md*' 2>/dev/null | grep -q . || { echo "❌ $rules_dir has no rule files"; exit 1; }
            if find "test-output/$h/agents" -name 'codeguard-[0-9]-*' 2>/dev/null | grep -q .; then
              echo "❌ rule files leaked into $h/agents/ (would be misread as agents)"
              exit 1
            fi
            echo "✅ $h agent bundle (rules: $rules_dir)"
          done

          echo "✅ All IDE formats generated successfully"

      - name: Summary
        if: success()
        run: |
          echo "✅ All validation checks passed!"
          echo ""
          echo "Rule validation: ✅"
          echo "Required files: ✅"
          echo "IDE conversion: ✅"
          echo "Skills directory: ✅"

